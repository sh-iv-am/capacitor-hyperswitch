<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Capacitor Hyperswitch Example</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <style>
      * { box-sizing: border-box; }
      body { font-family: sans-serif; padding: 16px; max-width: 600px; margin: 0 auto; }
      section { margin-bottom: 20px; padding: 16px; border: 1px solid #ccc; border-radius: 8px; }
      h2 { margin-top: 0; font-size: 1rem; }
      h3 { margin: 12px 0 6px; font-size: 0.9rem; color: #555; }
      pre { background: #f4f4f4; padding: 8px; border-radius: 4px; white-space: pre-wrap; word-break: break-all; min-height: 28px; font-size: 0.8rem; }
      button { margin: 4px 4px 0 0; padding: 8px 14px; cursor: pointer; }
      .cvc-placeholder {
        width: 100%; min-height: 50px; border: 1px dashed #aaa;
        border-radius: 4px; margin-top: 8px; background: #fafafa;
        display: flex; align-items: center; justify-content: center;
        color: #bbb; font-size: 0.8rem;
      }
      .payment-placeholder-container {
        width: 100%; height: 400px; border: 1px dashed #aaa;
        border-radius: 4px; margin-top: 8px; background: #fafafa;
      }
      .payment-placeholder {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        color: #bbb; font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Capacitor Hyperswitch</h1>

      <!-- Step 0: Fetch -->
      <section>
        <h2>Step 1 — Fetch Payment Intent</h2>
        <button onclick="fetchPaymentIntent()">Fetch</button>
        <pre id="fetchOutput">–</pre>
      </section>

      <!-- Flow 1 -->
      <section>
        <h2>Flow 1 — initPaymentSession</h2>

        <h3>Step 2</h3>
        <button onclick="initPaymentSession()">initPaymentSession</button>
        <pre id="initSessionOutput">–</pre>

        <h3>Path A — Payment Sheet</h3>
        <button onclick="presentSheet()">presentPaymentSheet</button>
        <pre id="sheetOutput">–</pre>

        <h3>Path B — Saved Methods</h3>
        <button onclick="getCustomerSavedPaymentMethods()">getCustomerSavedPaymentMethods</button>
        <pre id="savedMethodsOutput">–</pre>

        <div id="cvc-widget" class="cvc-placeholder">CVCWidget</div>
        <div style="margin-top: 8px;">
          <button onclick="mountCvcWidget()">Mount CVCWidget</button>
          <button onclick="unmountCvcWidget()">Unmount CVCWidget</button>
        </div>

        <div style="margin-top: 8px;">
          <button onclick="getLastUsedMethod()">Get Last Used</button>
          <button onclick="getDefaultMethod()">Get Default</button>
        </div>
        <pre id="savedDataOutput">–</pre>

        <div style="margin-top: 8px;">
          <button onclick="confirmWithLastUsed()">Confirm Last Used + CVC</button>
          <button onclick="confirmWithDefault()">Confirm Default + CVC</button>
        </div>
        <pre id="confirmSavedOutput">–</pre>
      </section>

      <!-- Flow 2 -->
      <section>
        <h2>Flow 2 — Elements</h2>

        <h3>Step 2</h3>
        <button onclick="initElements()">elements</button>
        <pre id="elementsOutput">–</pre>

        <h3>Step 3 — Mount PaymentElement</h3>
        <div class="payment-placeholder-container">
          <div id="payment-element" class="payment-placeholder"><span>PaymentElement</span></div>
        </div>
        <div style="margin-top: 8px;">
          <button onclick="mountPaymentElement()">Mount</button>
          <button onclick="unmountPaymentElement()">Unmount</button>
        </div>

        <h3>Step 4</h3>
        <button onclick="confirmViaElement()">confirmPayment</button>
        <button onclick="updateIntent()">updateIntent</button>
        <pre id="confirmOutput">–</pre>
      </section>
    </main>

    <script src="./js/example.js" type="module"></script>
  </body>
</html>
